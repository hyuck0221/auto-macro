name: Release macOS app

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    env:
      AUTO_MACRO_VERSION: ${{ github.ref_name }}
      AUTO_MACRO_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift toolchain
        run: swift --version
      - name: Run tests
        run: ./Scripts/run-tests.sh
      - name: Build app bundle
        run: ./Scripts/package-app.sh release "${AUTO_MACRO_VERSION#v}"
      - name: Create ZIP and DMG
        run: |
          mkdir -p release
          ditto -c -k --keepParent "dist/Auto Macro.app" "release/AutoMacro-${AUTO_MACRO_VERSION}-macos-${{ matrix.arch }}.zip"
          hdiutil create -volname "Auto Macro" -srcfolder "dist/Auto Macro.app" -ov -format UDZO "release/AutoMacro-${AUTO_MACRO_VERSION}-macos-${{ matrix.arch }}.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
