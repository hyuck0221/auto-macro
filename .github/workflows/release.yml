name: Release macOS app

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    env:
      AUTO_MACRO_VERSION: ${{ github.ref_name }}
      AUTO_MACRO_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift toolchain
        run: swift --version
      - name: Run tests
        run: ./Scripts/run-tests.sh
      - name: Import stable release signing identity
        timeout-minutes: 3
        env:
          SIGNING_P12_BASE64: ${{ secrets.AUTO_MACRO_SIGNING_P12_BASE64 }}
          SIGNING_P12_PASSWORD: ${{ secrets.AUTO_MACRO_SIGNING_P12_PASSWORD }}
        run: |
          if [[ -z "$SIGNING_P12_BASE64" || -z "$SIGNING_P12_PASSWORD" ]]; then
            echo "Missing stable signing secrets. Run Scripts/create-self-signed-signing-cert.sh and upload the printed GitHub secrets." >&2
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/auto-macro-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          P12_PATH="$RUNNER_TEMP/auto-macro-signing.p12"
          echo "Decoding signing identity…"
          printf '%s' "$SIGNING_P12_BASE64" | base64 --decode > "$P12_PATH"
          echo "Creating temporary keychain…"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "Importing signing identity…"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$SIGNING_P12_PASSWORD" -T /usr/bin/codesign
          echo "Configuring non-interactive private-key access…"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s \
            "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          echo "Reading stable certificate hash…"
          SIGNING_IDENTITY="$(security find-certificate -Z \
            -c "Auto Macro GitHub Release Signing" "$KEYCHAIN_PATH" \
            | awk '/SHA-1 hash:/ {print $3; exit}')"
          if [[ ! "$SIGNING_IDENTITY" =~ ^[[:xdigit:]]{40}$ ]]; then
            echo "Unable to locate the imported Auto Macro signing identity." >&2
            exit 1
          fi
          echo "AUTO_MACRO_CODESIGN_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "AUTO_MACRO_SELF_SIGNED_CERT_SHA1=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "Stable signing identity is ready."
      - name: Build app bundle
        run: ./Scripts/package-app.sh release "${AUTO_MACRO_VERSION#v}"
      - name: Install DMG packaging tool
        run: brew install create-dmg
      - name: Create ZIP and DMG
        run: |
          mkdir -p release
          ditto -c -k --keepParent "dist/Auto Macro.app" "release/AutoMacro-${AUTO_MACRO_VERSION}-macos-${{ matrix.arch }}.zip"
          ./Scripts/create-dmg.sh "dist/Auto Macro.app" "release/AutoMacro-${AUTO_MACRO_VERSION}-macos-${{ matrix.arch }}.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error
      - name: Remove temporary signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/auto-macro-signing.keychain-db" 2>/dev/null || true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
